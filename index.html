<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="課題を楽しく管理する大学生向けタスク管理アプリ">
  <title>Task Capsule</title>
  <link rel="stylesheet" href="style.css?v=fixed-task-colors">
</head>
<body>
  <header class="site-header">
    <div class="brand-area">
      <div class="brand" aria-label="Task Capsule">
        <span class="brand-icon" aria-hidden="true"></span>
        <span>TASK CAPSULE</span>
      </div>
      <span class="header-nickname" id="header-nickname"></span>
    </div>
    <div class="header-actions">
      <button class="header-button" id="home-button" type="button">ホーム</button>
      <button class="header-button header-button-reset" id="reset-button" type="button">リセット</button>
    </div>
  </header>

  <main class="app">
    <section class="page welcome-page is-active" id="welcome-page" aria-labelledby="welcome-title">
      <div class="welcome-art" aria-hidden="true">
        <div class="gacha-machine">
          <div class="gacha-window">
            <i class="ball ball-yellow"></i>
            <i class="ball ball-blue"></i>
            <i class="ball ball-pink"></i>
          </div>
          <div class="gacha-base"></div>
        </div>
      </div>

      <div class="panel welcome-panel">
        <p class="eyebrow">YOUR CAMPUS COMPANION</p>
        <h1 id="welcome-title">ようこそ！</h1>
        <p class="lead">課題を整理して、やる気を貯めよう。</p>

        <form id="profile-form" class="form-grid">
          <label class="field">
            <span>ニックネーム</span>
            <input id="display-name" name="displayName" type="text" placeholder="例：はな" required>
          </label>
          <button class="button button-primary button-wide" type="submit">保存して次へ <span aria-hidden="true">→</span></button>
        </form>
        <p class="form-note">入力内容はこのブラウザに保存されます。</p>
      </div>
    </section>

    <section class="page dashboard-page" id="main-page" aria-label="メインページ" hidden>
      <div class="page-heading">
        <button class="button button-primary" type="button" data-page="task">＋ タスク追加</button>
      </div>

      <div class="dashboard-grid">
        <aside class="panel character-card">
          <span class="level-badge">LEVEL <strong id="character-level">2</strong></span>
          <div class="character-stage">
            <div class="character-placeholder" id="character-placeholder" role="img" aria-label="キャラクター画像（2）">
              <span id="character-fallback-text">キャラクター画像（2）</span>
            </div>
            <img id="character-image" src="images/character2.png" alt="キャラクター画像（2）">
          </div>
          <div class="character-copy">
            <h2>かけだしタマゴ</h2>
          </div>
        </aside>

        <section class="panel task-panel task-list-panel" aria-labelledby="task-list-title">
          <div class="section-heading">
            <div>
              <h2 id="task-list-title">タスク一覧</h2>
            </div>
            <div class="task-list-controls">
              <label class="sort-control" for="task-sort">
                <span>並び替え</span>
                <select id="task-sort" name="taskSort">
                  <option value="deadline" selected>締切順</option>
                  <option value="duration">所要時間（長い順）</option>
                </select>
              </label>
              <span class="count-badge" id="task-count">0件</span>
            </div>
          </div>

          <div class="task-list task-list-scroll" id="task-list" aria-live="polite">
            <div class="empty-state">
              <div class="empty-icon" aria-hidden="true">✓</div>
              <h3>タスクはまだありません</h3>
              <p>課題を登録すると、ここに一覧で表示されます。</p>
              <button class="text-button" type="button" data-page="task">最初のタスクを追加する →</button>
            </div>
          </div>
        </section>

        <section class="panel gacha-card" aria-labelledby="gacha-title">
          <div class="section-heading">
            <div>
              <h2 id="gacha-title">タスクボール</h2>
            </div>
          </div>
          <div class="ball-area" id="gacha-balls" aria-live="polite">
            <p class="gacha-empty">タスク1件につき<br>ボールが1個入ります</p>
          </div>
        </section>

        <section class="cups-area" aria-label="成長ゲージ">
          <article class="cup-card cup-card-juice">
            <div class="cup-copy">
              <small>JUICE</small>
              <span id="juice-count">0 / 5</span>
            </div>
            <div class="cup" id="juice-cup" aria-label="ジュース 0 / 5">
              <i class="straw"></i>
              <div class="cup-blocks" id="juice-blocks" aria-hidden="true"></div>
              <span class="juice-mark" aria-hidden="true">✚</span>
            </div>
          </article>

          <article class="cup-card cup-card-skull">
            <div class="cup-copy">
              <small>POISON</small>
              <span id="skull-count">0 / 5</span>
            </div>
            <div class="cup" id="skull-cup" aria-label="POISON 0 / 5">
              <i class="straw"></i>
              <div class="cup-blocks" id="skull-blocks" aria-hidden="true"></div>
              <span class="skull-mark" aria-hidden="true">☠</span>
            </div>
          </article>
        </section>
      </div>
    </section>

    <section class="page task-form-page" id="task-page" aria-labelledby="task-title" hidden>
      <div class="form-page-heading">
        <button class="back-button" type="button" data-page="main" aria-label="メインページへ戻る">←</button>
        <div>
          <p class="eyebrow">NEW ASSIGNMENT</p>
          <h1 id="task-title">タスクを追加</h1>
          <p>課題の予定を整理しましょう。</p>
        </div>
      </div>

      <form id="task-form" class="panel task-form">
        <label class="field field-full">
          <span>課題名 <em>必須</em></span>
          <input id="task-title-input" name="title" type="text" placeholder="例：心理学レポート" required>
        </label>
        <label class="field">
          <span>締切日 <em>必須</em></span>
          <input id="task-deadline-input" name="deadline" type="date" min="1000-01-01" max="9999-12-31" title="西暦4桁で入力してください" required>
        </label>
        <label class="field">
          <span>締切時刻 <em>必須</em></span>
          <input id="task-deadline-time-input" name="deadlineTime" type="time" required>
        </label>
        <label class="field">
          <span>所要時間（分） <em>必須</em></span>
          <input id="task-duration-input" name="duration" type="number" min="1" step="1" placeholder="例：90" required>
        </label>
        <label class="field field-full">
          <span>メモ</span>
          <textarea id="task-memo-input" name="memo" rows="5" placeholder="提出形式や参考資料など"></textarea>
        </label>
        <div class="form-actions field-full">
          <button class="button button-secondary" type="button" data-page="main">戻る</button>
          <button class="button button-primary" type="submit">登録する</button>
        </div>
        <p class="form-note field-full">登録内容はこのブラウザに保存されます。</p>
      </form>
    </section>
  </main>

  <template id="task-card-template">
    <article class="task-card">
      <div class="task-card-content">
        <h3 data-task-title></h3>
        <dl class="task-meta">
          <div><dt>締切</dt><dd data-task-deadline></dd></div>
          <div><dt>所要時間</dt><dd data-task-duration></dd></div>
        </dl>
        <p class="task-memo" data-task-memo></p>
      </div>
      <div class="task-actions">
        <button class="task-button task-button-complete" type="button" data-action="complete">完了</button>
        <button class="task-button task-button-delete" type="button" data-action="delete">削除</button>
      </div>
    </article>
  </template>

  <script src="script.js?v=nickname-poison-readme"></script>
</body>
</html>
